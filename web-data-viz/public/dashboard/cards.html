<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychology | Tempo Real</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<!-- <body onload="validarSessao(), exibirAquarios(),  atualizacaoPeriodica()"> -->

<body onload="carregarQuiz()">
    <div class="janela">

        <div class="header-left dash-header">

            <h1>Psychology</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <h3>Quiz</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Dashboard</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">

            <div class="quiz-container">
                <h1>Quiz do Bem-Estar</h1>
                <p>
                    Responda às perguntas abaixo para refletir sobre hábitos relacionados
                    à dopamina, serotonina, endorfina e ocitocina.
                </p>

                <div id="area_perguntas"></div>

                <button onclick="finalizarQuiz()">Finalizar Quiz</button>

                <div id="resultado_quiz"></div>
            </div>

        </div>

    </div>
</body>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    var perguntas = [
        {
            texto: "Você dorme bem na maioria dos dias?",
            hormonio: "Serotonina"
        },
        {
            texto: "Você pratica atividade física durante a semana?",
            hormonio: "Endorfina"
        },
        {
            texto: "Você costuma concluir pequenas metas no seu dia?",
            hormonio: "Dopamina"
        },
        {
            texto: "Você tem contato social positivo com outras pessoas?",
            hormonio: "Ocitocina"
        }
    ];

    function carregarQuiz() {
        var areaPerguntas = document.getElementById("area_perguntas");

        for (var i = 0; i < perguntas.length; i++) {
            areaPerguntas.innerHTML += `
                <div class="card-pergunta">
                    <h3>${i + 1}. ${perguntas[i].texto}</h3>
                    <p>Hormônio relacionado: <b>${perguntas[i].hormonio}</b></p>

                    <label>
                        <input type="radio" name="pergunta${i}" value="sim">
                        Sim
                    </label>

                    <label>
                        <input type="radio" name="pergunta${i}" value="nao">
                        Não
                    </label>
                </div>
            `;
        }
    }

    function finalizarQuiz() {
        var pontos = 0;

        for (var i = 0; i < perguntas.length; i++) {
            var resposta = document.querySelector(`input[name="pergunta${i}"]:checked`);

            if (resposta != null && resposta.value == "sim") {
                pontos++;
            }
        }

        resultado_quiz.innerHTML = `
            <h2>Resultado</h2>
            <p>Você respondeu positivamente ${pontos} de ${perguntas.length} perguntas.</p>
        `;
    }
</script>

</html>
