<body onload="validarSessao(); carregarDashboardQuiz();">

    <div class="janela">
        <div class="header-left dash-header">
            <h1>Psychology</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3>Quiz</h3>
                </a>
            </div>

            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>
    </div>

    <div class="dash">

    <div class="dashboard-quiz">
        <h1>Resultado do Quiz</h1>

        <div class="cards-resultado">
            <div class="card-resultado">
                <h3>Serotonina</h3>
                <p id="porcentagem_serotonina">0%</p>

            <div class="card-resultado">
                <h3>Dopamina</h3>
                <p id="porcentagem_dopamina">0%</p>
            </div>

            <div class="card-resultado">
                <h3>Endorfina</h3>
                <p id="porcentagem_endorfina">0%</p>
            </div>

            <div class="card-resultado">
                <h3>Ocitocina</h3>
                <p id="porcentagem_ocitocina">0%</p>
            </div>
        </div>

        <div class="area-grafico-quiz">
            <canvas id="graficoQuiz"></canvas>
        </div>
    </div>

</div>
